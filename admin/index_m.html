<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOVACS GOAT Configuration</title>
    <link rel="stylesheet" href="../../lib/css/materialize.css">
    <link rel="stylesheet" href="../../css/adapter.css">
    <style>
        .panel {
            margin: 10px 0;
            padding: 15px;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 2px;
        }
        .panel-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 2px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .checkbox-item label {
            cursor: pointer;
            margin: 0;
            font-weight: normal;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f5f5f5;
            font-weight: bold;
            color: #555;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .btn {
            padding: 8px 16px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 5px;
        }
        .btn:hover {
            background-color: #1976D2;
        }
        .btn-secondary {
            background-color: #757575;
        }
        .btn-secondary:hover {
            background-color: #616161;
        }
        .loading {
            color: #999;
            font-style: italic;
        }
        .no-devices {
            color: #999;
            text-align: center;
            padding: 20px;
        }
        .device-status {
            padding: 4px 8px;
            border-radius: 2px;
            font-size: 12px;
            text-align: center;
        }
        .status-connected {
            background-color: #c8e6c9;
            color: #2e7d32;
        }
        .status-offline {
            background-color: #ffcccc;
            color: #c62828;
        }
        .device-battery {
            font-weight: bold;
            color: #1976D2;
        }
    </style>
</head>
<body>
    <div class="adapter-settings">
        <!-- Authentication Panel -->
        <div class="panel">
            <div class="panel-title" data-i18n="Authentication"></div>
            
            <div class="form-group">
                <label for="username" data-i18n="username_label"></label>
                <input type="text" id="username" class="form-control" placeholder="">
            </div>
            
            <div class="form-group">
                <label for="password" data-i18n="password_label"></label>
                <input type="password" id="password" class="form-control" placeholder="">
            </div>
        </div>

        <!-- Debug Settings Panel -->
        <div class="panel">
            <div class="panel-title" data-i18n="Debug Options"></div>
            
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="debugAuth">
                    <label for="debugAuth" data-i18n="debug_auth_label"></label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="debugTopics">
                    <label for="debugTopics" data-i18n="debug_topics_label"></label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="debugRawTraffic">
                    <label for="debugRawTraffic" data-i18n="debug_raw_traffic_label"></label>
                </div>
            </div>
        </div>

        <!-- Devices Panel -->
        <div class="panel">
            <div class="panel-title" data-i18n="devices_title"></div>
            
            <button id="loadDevicesBtn" class="btn" data-i18n="load_devices"></button>
            <button id="refreshDevicesBtn" class="btn btn-secondary" data-i18n="refresh"></button>
            
            <table id="devicesTable" style="display: none;">
                <thead>
                    <tr>
                        <th data-i18n="device_active"></th>
                        <th data-i18n="device_name"></th>
                        <th data-i18n="device_id"></th>
                        <th data-i18n="device_model"></th>
                        <th data-i18n="device_status"></th>
                        <th data-i18n="device_battery"></th>
                    </tr>
                </thead>
                <tbody id="devicesList"></tbody>
            </table>
            
            <div id="noDevices" class="no-devices" data-i18n="no_devices"></div>
        </div>
    </div>

    <script src="../../lib/js/materialize.js"></script>
    <script src="../../js/adapter-settings.js"></script>
    <script>
        // Mock devices for demonstration
        const mockDevices = [
            { id: 'device_001', name: 'Living Room Vacuum', model: 'GOAT-X1', status: 'connected', battery: 85 },
            { id: 'device_002', name: 'Bedroom Vacuum', model: 'GOAT-X2', status: 'offline', battery: 20 },
            { id: 'device_003', name: 'Kitchen Robot', model: 'GOAT-PRO', status: 'connected', battery: 100 }
        ];

        let currentSettings = {};
        let currentDevices = {};

        // Load settings
        function load(settings) {
            currentSettings = settings;
            
            if (settings.username !== undefined) {
                document.getElementById('username').value = settings.username;
            }
            if (settings.password !== undefined) {
                document.getElementById('password').value = settings.password;
            }
            if (settings.debugAuth !== undefined) {
                document.getElementById('debugAuth').checked = settings.debugAuth;
            }
            if (settings.debugTopics !== undefined) {
                document.getElementById('debugTopics').checked = settings.debugTopics;
            }
            if (settings.debugRawTraffic !== undefined) {
                document.getElementById('debugRawTraffic').checked = settings.debugRawTraffic;
            }
            if (settings.devices !== undefined) {
                currentDevices = settings.devices;
            }

            onChange(false);
        }

        // Save settings
        function save() {
            const settings = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                debugAuth: document.getElementById('debugAuth').checked,
                debugTopics: document.getElementById('debugTopics').checked,
                debugRawTraffic: document.getElementById('debugRawTraffic').checked,
                devices: currentDevices
            };

            return settings;
        }

        // Load devices (mock)
        function loadDevices() {
            document.getElementById('loadDevicesBtn').disabled = true;
            document.getElementById('loadDevicesBtn').textContent = 'Loading...';
            
            setTimeout(() => {
                displayDevices(mockDevices);
                document.getElementById('loadDevicesBtn').disabled = false;
                document.getElementById('loadDevicesBtn').textContent = 'Load Devices';
            }, 500);
        }

        // Display devices in table
        function displayDevices(devices) {
            const tbody = document.getElementById('devicesList');
            const table = document.getElementById('devicesTable');
            const noDevices = document.getElementById('noDevices');

            tbody.innerHTML = '';

            if (!devices || devices.length === 0) {
                table.style.display = 'none';
                noDevices.style.display = 'block';
                return;
            }

            devices.forEach(device => {
                const isActive = currentDevices[device.id] !== false;
                const statusClass = device.status === 'connected' ? 'status-connected' : 'status-offline';
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="checkbox" class="device-checkbox" data-device-id="${device.id}" ${isActive ? 'checked' : ''}></td>
                    <td>${device.name}</td>
                    <td>${device.id}</td>
                    <td>${device.model}</td>
                    <td><span class="device-status ${statusClass}">${device.status}</span></td>
                    <td><span class="device-battery">${device.battery}%</span></td>
                `;
                tbody.appendChild(row);
            });

            // Add event listeners
            document.querySelectorAll('.device-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const deviceId = this.getAttribute('data-device-id');
                    currentDevices[deviceId] = this.checked;
                    onChange(false);
                });
            });

            table.style.display = 'table';
            noDevices.style.display = 'none';
        }

        // Event listeners
        document.getElementById('loadDevicesBtn').addEventListener('click', loadDevices);
        document.getElementById('refreshDevicesBtn').addEventListener('click', loadDevices);

        document.getElementById('username').addEventListener('change', () => onChange(false));
        document.getElementById('password').addEventListener('change', () => onChange(false));
        document.getElementById('debugAuth').addEventListener('change', () => onChange(false));
        document.getElementById('debugTopics').addEventListener('change', () => onChange(false));
        document.getElementById('debugRawTraffic').addEventListener('change', () => onChange(false));
    </script>
</body>
</html>
